<!DOCTYPE html>
<html>
<head>

  <title>SOB Reverse Combo Finder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link
href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap"
rel="stylesheet">
  <style>

    *{
  font-family:'Arimo',sans-serif;
  box-sizing:border-box;
}

body{
  text-align:center;
  margin:0;
  padding:0;
  color:#222;

  background:
  linear-gradient(
  180deg,
  #f8fbff,
  #eef3f9
  );
}
    h2{
  margin-top:10px;
  margin-bottom:18px;
  font-size:26px;
  font-weight:bold;
}
.container{
margin-top:20px;
}
    .box{

  max-width:450px;
  margin:auto;

  background:white;

  padding:18px;

  border-radius:18px;

  box-shadow:
  8px 8px 20px rgba(0,0,0,.12);

}
input{

  width:90%;
  max-width:340px;

  padding:12px;

  margin:8px;

  font-size:16px;

  border:none;

  border-radius:14px;

  background:#fff;

  box-shadow:
  inset 2px 2px 5px rgba(0,0,0,.08),
  4px 4px 10px rgba(0,0,0,.12);

}

    input:focus{
      border-color:#1565c0;
    }

    .result{
      margin-top:18px;
      text-align:left;
    }

    .combo{
      background:#fafafa;
      border:1px solid #e2e2e2;
      border-radius:10px;
      padding:14px;
      margin-bottom:14px;
    }

    .title{
      font-weight:bold;
      color:#1565c0;
      font-size:16px;
      line-height:1.4;
    }

    .sub{
      font-size:12px;
      color:#777;
      font-weight:normal;
      margin-top:2px;
    }

    .match{
      margin-top:12px;
      padding-top:10px;
      border-top:1px dashed #ddd;
    }

    .pax{
      font-size:14px;
      margin-bottom:5px;
    }

    .amounts{
      font-size:13px;
      color:#666;
      line-height:1.5;
      margin-bottom:8px;
    }

    .ac{
      background:#f1f1f1;
      border-radius:6px;
      padding:7px 10px;
      margin-bottom:5px;
      font-size:14px;
    }

    .footer{
      margin-top:20px;
      font-size:12px;
      color:#777;
    }

.top-switch{
display:flex;
justify-content:center;
align-items:center;
width:100%;
padding:12px 0;
margin:0 auto 10px auto;
}
   .switch-btn{
background:linear-gradient(
135deg,
#1976d2,
#0d47a1
);

box-shadow:
4px 4px 0 #0b3a82,
6px 8px 14px rgba(0,0,0,.18);

transition:.15s;
color:white;
padding:6px 10px;
border-radius:6px;
text-decoration:none;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.switch-btn:hover{

transform:
translate(-1px,-1px);

filter:brightness(1.08);

box-shadow:
5px 5px 0 #0b3a82,
8px 10px 16px rgba(0,0,0,.24);

}

.switch-btn:active{

transform:translateY(3px);

box-shadow:
0 1px 0 #0b3a82,
0 2px 4px rgba(0,0,0,.15);

}

.combo-btn{

background:linear-gradient(
135deg,
#1976d2,
#0d47a1
);

color:white !important;

padding:10px 18px;

border-radius:12px;

font-size:13px;
font-weight:bold;
letter-spacing:.3px;

text-decoration:none;

display:inline-block;

box-shadow:
4px 4px 0 #0b3a82,
6px 8px 14px rgba(0,0,0,.20);

transition:all .15s ease;

}
    .reset-btn{

background:linear-gradient(
to bottom,
#ffffff,
#e8e8e8
);

box-shadow:
4px 4px 0 #bdbdbd,
6px 8px 14px rgba(0,0,0,.18);

transition:all .15s ease;

padding:10px 18px;

border:none;
border-radius:14px;

font-weight:bold;
font-size:13px;

cursor:pointer;

}

.reset-btn:hover{

transform:
translate(-1px,-1px);

box-shadow:
5px 5px 0 #bdbdbd,
8px 10px 16px rgba(0,0,0,.22);

}

.reset-btn:active{

transform:translateY(3px);

box-shadow:
0 1px 0 #bdbdbd,
0 2px 4px rgba(0,0,0,.15);

}
    .input-row{
  display:flex;
  gap:10px;
  justify-content:center;
}

.input-row input{
  width:50%;
  margin:7px 0;
}

  </style>

</head>

<body>

<div class="top-switch">

  <a class="switch-btn combo-btn"
href="https://sobcombo.github.io/s/"
target="_blank">
Switch to Combo Calc
</a>

</div>

<h2>SOB Reverse Combo Finder</h2>

<div class="container">
<div class="box">

  <input type="number"
    id="oepl"
    placeholder="Enter OEPL Amount"
    oninput="reverseCalc()">

  <input type="number"
    id="paepl"
    placeholder="Enter PAEPL Amount"
    oninput="reverseCalc()">

  <input type="number"
    id="tpu"
    placeholder="Enter TPU Amount"
    oninput="reverseCalc()">

<input type="number"
  id="totalAmount"
  placeholder="Enter Total Combo Amount"
  oninput="reverseCalc()">
  
<div class="input-row">

  <input type="number"
    id="adultCount"
    placeholder="Adults"
    oninput="reverseCalc()">

  <input type="number"
    id="childCount"
    placeholder="Children"
    oninput="reverseCalc()">

</div>
  
  <br>

  <button class="reset-btn"
    onclick="resetFields()">

    Reset

  </button>

  <div class="result" id="result">
    Enter amount to search...
  </div>

</div>
</div>
<script>

const combos = [

{
name:"390/300 TU Explorer Combo",
adultTPU:170,
childTPU:80,
oepl:70,
paepl:150,
na:false
},

{
name:"397/307 Adventure Combo",
adultTPU:170,
childTPU:80,
oepl:0,
paepl:227,
na:false
},

{
name:"398/308 ECO FUN Combo",
adultTPU:170,
childTPU:80,
oepl:28,
paepl:200,
na:false
},

{
name:"425/335 Snow Adventure Combo",
adultTPU:170,
childTPU:80,
oepl:255,
paepl:0,
na:false
},

{
name:"499/399 Astha Combo",
adultTPU:400,
childTPU:300,
oepl:0,
paepl:99,
na:false
},

{
name:"545/355 Shiv Ganesha Combo",
adultTPU:370,
childTPU:180,
oepl:0,
paepl:175,
na:false
},

{
name:"600/425 Namah Combo",
adultTPU:550,
childTPU:375,
oepl:0,
paepl:50,
na:false
},

{
name:"699/NA Ultimate Play Combo",
adultTPU:170,
childTPU:170,
oepl:0,
paepl:529,
na:true
},

{
name:"745/555 Viewing Fun Combo",
adultTPU:370,
childTPU:180,
oepl:325,
paepl:50,
na:false
},

{
name:"969/794 Symbolic Combo",
adultTPU:550,
childTPU:375,
oepl:249,
paepl:170,
na:false
},

{
name:"1099/1009 Delight Combo",
adultTPU:170,
childTPU:80,
oepl:355,
paepl:574,
na:false
},

{
name:"1299/1109 Mini Blast Combo",
adultTPU:370,
childTPU:180,
oepl:355,
paepl:574,
na:false
},

{
name:"1399/1224 All in Fun Combo",
adultTPU:550,
childTPU:375,
oepl:250,
paepl:599,
na:false
},

{
name:"1500/925 Divine Rush Combo",
adultTPU:1350,
childTPU:775,
oepl:0,
paepl:150,
na:false
},

{
name:"4199/NA Ultimate Mega Combo",
adultTPU:1400,
childTPU:1400,
oepl:449,
paepl:2350,
na:true
}

];

function reverseCalc(){

  let oepl =
    parseInt(document.getElementById("oepl").value) || 0;

  let paepl =
    parseInt(document.getElementById("paepl").value) || 0;

  let tpu =
    parseInt(document.getElementById("tpu").value) || 0;

  let totalAmount =
    parseInt(document.getElementById("totalAmount").value) || 0;
let adultCount =
  parseInt(document.getElementById("adultCount").value);

let childCount =
  parseInt(document.getElementById("childCount").value);
  if(
    oepl === 0 &&
    paepl === 0 &&
    tpu === 0 &&
    totalAmount === 0
  ){

    document.getElementById("result").innerHTML =
  '<div style="text-align:center;">Enter any amount to search!</div>';

    return;
  }

  let html = "";

  combos.forEach(c => {

    let paxList = [];

    let parts = c.name.split("/");

    let adultPrice =
      parseInt(parts[0]) || 0;

    let childPrice =
      c.na
        ? 0
        : (parseInt(parts[1]) || 0);

    for(let pax = 1; pax <= 50; pax++){

      let oeplMatch = true;
      let paeplMatch = true;

      if(oepl > 0){

        if(c.oepl <= 0){
          oeplMatch = false;
        } else {
          oeplMatch =
            (pax * c.oepl === oepl);
        }

      }

      if(paepl > 0){

        if(c.paepl <= 0){
          paeplMatch = false;
        } else {
          paeplMatch =
            (pax * c.paepl === paepl);
        }

      }

      if(oeplMatch && paeplMatch){

        let matches = [];

        if(c.na){

          let calcTPU =
            pax * c.adultTPU;

          let calcTotal =
            pax * adultPrice;

          if(
            (tpu === 0 || calcTPU === tpu) &&
            (totalAmount === 0 || calcTotal === totalAmount)
          ){

            matches.push({
              adults:pax,
              children:0,
              total:calcTotal
            });

          }

        } else {

          for(let a = 0; a <= pax; a++){

            let ch = pax - a;

            let calcTPU =
              (a * c.adultTPU) +
              (ch * c.childTPU);

            let calcTotal =
              (a * adultPrice) +
              (ch * childPrice);

            if(
  (tpu === 0 || calcTPU === tpu) &&
  (totalAmount === 0 || calcTotal === totalAmount) &&
  (isNaN(adultCount) || a === adultCount) &&
  (isNaN(childCount) || ch === childCount)
){

              matches.push({
                adults:a,
                children:ch,
                total:calcTotal
              });

            }

          }

        }

        if(matches.length > 0){

          paxList.push({
            pax:pax,
            matches:matches
          });

        }

      }

    }

    if(paxList.length > 0){

      html += `
        <div class="combo">

          <div class="title">
            ${c.name}

            <div class="sub">
              Possibilities
            </div>
          </div>
      `;

      paxList.forEach(p => {

        let oeplTotal =
          c.oepl * p.pax;

        let paeplTotal =
          c.paepl * p.pax;

        html += `
          <div class="match">

            <div class="pax">
              <b>Pax:</b> ${p.pax}
            </div>

            <div class="amounts">

              TPU:
              ₹${tpu || "-"}

              <br>

              OEPL:
              ₹${oeplTotal}

              ${c.oepl > 0
                ? `(₹${c.oepl} × ${p.pax})`
                : ""
              }

              <br>

              PAEPL:
              ₹${paeplTotal}

              ${c.paepl > 0
                ? `(₹${c.paepl} × ${p.pax})`
                : ""
              }

            </div>
        `;

        p.matches.forEach(m => {

          let comboTPU =
            (m.adults * c.adultTPU) +
            (m.children * c.childTPU);

          html += `
            <div class="ac">

              A: ${m.adults}

              &nbsp; | &nbsp;

              C: ${m.children}

              &nbsp; | &nbsp;

              Total: ₹${m.total}

              &nbsp; | &nbsp;

              TPU: ₹${comboTPU}

            </div>
          `;

        });

        html += `
          </div>
        `;

      });

      html += `
        </div>
      `;

    }

  });

  if(html === ""){

    html = "No matching combo found.";

  }

  document.getElementById("result").innerHTML = html;

}
function resetFields(){

  document.getElementById("oepl").value = "";

  document.getElementById("paepl").value = "";

  document.getElementById("tpu").value = "";

  document.getElementById("totalAmount").value = "";

  document.getElementById("result").innerHTML =
  '<div style="text-align:center;">Enter any amount to search!</div>';
document.getElementById("adultCount").value = "";
document.getElementById("childCount").value = "";
}

</script>

</body>
</html>
