<!DOCTYPE html>
<html>
<head>

  <title>SOB Reverse Combo Finder</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      margin:0;
      padding:18px;
      text-align:center;
      color:#222;
    }

    h2{
      margin-bottom:18px;
      font-size:24px;
    }

    .box{
      background:white;
      max-width:450px;
      margin:auto;
      padding:18px;
      border-radius:12px;
      box-shadow:0 2px 12px rgba(0,0,0,0.08);
    }

    input{
      width:90%;
      max-width:340px;
      padding:12px;
      margin:7px 0;
      border-radius:8px;
      border:1px solid #ccc;
      font-size:15px;
      outline:none;
    }

    input:focus{
      border-color:#1565c0;
    }

    .result{
      margin-top:18px;
      text-align:left;
    }

    .combo{
      background:#fafafa;
      border:1px solid #e2e2e2;
      border-radius:10px;
      padding:14px;
      margin-bottom:14px;
    }

    .title{
      font-weight:bold;
      color:#1565c0;
      font-size:16px;
      line-height:1.4;
    }

    .sub{
      font-size:12px;
      color:#777;
      font-weight:normal;
      margin-top:2px;
    }

    .match{
      margin-top:12px;
      padding-top:10px;
      border-top:1px dashed #ddd;
    }

    .pax{
      font-size:14px;
      margin-bottom:5px;
    }

    .amounts{
      font-size:13px;
      color:#666;
      line-height:1.5;
      margin-bottom:8px;
    }

    .ac{
      background:#f1f1f1;
      border-radius:6px;
      padding:7px 10px;
      margin-bottom:5px;
      font-size:14px;
    }

    .footer{
      margin-top:20px;
      font-size:12px;
      color:#777;
    }

  </style>

</head>

<body>

<h2>SOB Reverse Combo Finder</h2>

<div class="box">

  <input type="number"
    id="oepl"
    placeholder="Enter OEPL Amount"
    oninput="reverseCalc()">

  <input type="number"
    id="paepl"
    placeholder="Enter PAEPL Amount"
    oninput="reverseCalc()">

  <input type="number"
    id="tpu"
    placeholder="Enter TPU Amount"
    oninput="reverseCalc()">

  <div class="result" id="result">
    Enter amount to search...
  </div>

</div>

<script>

const combos = [

{
name:"390/300 TU Explorer Combo",
adultTPU:170,
childTPU:80,
oepl:70,
paepl:150,
na:false
},

{
name:"397/307 Adventure Combo",
adultTPU:170,
childTPU:80,
oepl:0,
paepl:227,
na:false
},

{
name:"398/308 ECO FUN Combo",
adultTPU:170,
childTPU:80,
oepl:28,
paepl:200,
na:false
},

{
name:"425/335 Snow Adventure Combo",
adultTPU:170,
childTPU:80,
oepl:255,
paepl:0,
na:false
},

{
name:"499/399 Astha Combo",
adultTPU:400,
childTPU:300,
oepl:0,
paepl:99,
na:false
},

{
name:"545/355 Shiv Ganesha Combo",
adultTPU:370,
childTPU:180,
oepl:0,
paepl:175,
na:false
},

{
name:"600/425 Namah Combo",
adultTPU:550,
childTPU:375,
oepl:0,
paepl:50,
na:false
},

{
name:"699/NA Ultimate Play Combo",
adultTPU:170,
childTPU:170,
oepl:0,
paepl:529,
na:true
},

{
name:"745/555 Viewing Fun Combo",
adultTPU:370,
childTPU:180,
oepl:325,
paepl:50,
na:false
},

{
name:"969/794 Symbolic Combo",
adultTPU:550,
childTPU:375,
oepl:249,
paepl:170,
na:false
},

{
name:"1099/1009 Delight Combo",
adultTPU:170,
childTPU:80,
oepl:355,
paepl:574,
na:false
},

{
name:"1299/1109 Mini Blast Combo",
adultTPU:370,
childTPU:180,
oepl:355,
paepl:574,
na:false
},

{
name:"1399/1224 All in Fun Combo",
adultTPU:550,
childTPU:375,
oepl:250,
paepl:599,
na:false
},

{
name:"1500/925 Divine Rush Combo",
adultTPU:1350,
childTPU:775,
oepl:0,
paepl:150,
na:false
},

{
name:"4199/NA Ultimate Mega Combo",
adultTPU:1400,
childTPU:1400,
oepl:449,
paepl:2350,
na:true
}

];

function reverseCalc(){

  let oepl =
    parseInt(document.getElementById("oepl").value) || 0;

  let paepl =
    parseInt(document.getElementById("paepl").value) || 0;

  let tpu =
    parseInt(document.getElementById("tpu").value) || 0;

  if(oepl === 0 && paepl === 0 && tpu === 0){

    document.getElementById("result").innerHTML =
      "Enter amount to search...";

    return;
  }

  let html = "";

  combos.forEach(c => {

    let paxList = [];

    for(let pax = 1; pax <= 50; pax++){

      let oeplMatch = true;
      let paeplMatch = true;

      if(oepl > 0){

        if(c.oepl <= 0){
          oeplMatch = false;
        } else {
          oeplMatch = (pax * c.oepl === oepl);
        }

      }

      if(paepl > 0){

        if(c.paepl <= 0){
          paeplMatch = false;
        } else {
          paeplMatch = (pax * c.paepl === paepl);
        }

      }

      if(oeplMatch && paeplMatch){

        let matches = [];

        if(c.na){

          let calcTPU = pax * c.adultTPU;

          if(tpu === 0 || calcTPU === tpu){

            matches.push({
              adults:pax,
              children:0
            });

          }

        } else {

          for(let a = 0; a <= pax; a++){

            let ch = pax - a;

            let calcTPU =
              (a * c.adultTPU) +
              (ch * c.childTPU);

            if(tpu === 0 || calcTPU === tpu){

              matches.push({
                adults:a,
                children:ch
              });

            }

          }

        }

        if(matches.length > 0){

          paxList.push({
            pax:pax,
            matches:matches
          });

        }

      }

    }

    if(paxList.length > 0){

      html += `
        <div class="combo">

          <div class="title">
            ${c.name}

            <div class="sub">
              Possibilities
            </div>
          </div>
      `;

      paxList.forEach(p => {

        let oeplTotal = c.oepl * p.pax;
        let paeplTotal = c.paepl * p.pax;

        html += `
          <div class="match">

            <div class="pax">
              <b>Pax:</b> ${p.pax}
            </div>

            <div class="amounts">

              TPU:
              ₹${tpu || "-"}

              <br>

              OEPL:
              ₹${oeplTotal}

              ${c.oepl > 0
                ? `(₹${c.oepl} × ${p.pax})`
                : ""
              }

              <br>

              PAEPL:
              ₹${paeplTotal}

              ${c.paepl > 0
                ? `(₹${c.paepl} × ${p.pax})`
                : ""
              }

            </div>
        `;

        p.matches.forEach(m => {

          let comboTPU =
  (m.adults * c.adultTPU) +
  (m.children * c.childTPU);

html += `
  <div class="ac">

    A: ${m.adults}

    &nbsp; | &nbsp;

    C: ${m.children}

    &nbsp;

    (TPU: ₹${comboTPU})

  </div>
`;

        });

        html += `
          </div>
        `;

      });

      html += `
        </div>
      `;

    }

  });

  if(html === ""){

    html = "No matching combo found.";

  }

  document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
